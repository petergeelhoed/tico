name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies and Doxygen/Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc g++ \
            clang clang-tidy \
            libfftw3-dev \
            libasound2-dev \
            doxygen graphviz

      - name: Verify Doxygen and Graphviz installation
        run: |
          doxygen --version
          dot -V

      - name: Show toolchain versions
        run: |
          echo "Compiler: ${{ matrix.compiler }}"
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            gcc --version
            g++ --version
          else
            clang --version
            clang++ --version
          fi
          cmake --version

      - name: Run quality workflow
        run: |
          cmake --workflow --preset quality

